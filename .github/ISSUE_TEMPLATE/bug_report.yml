name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Local Review runs entirely on your machine — please don't paste private code you can't share.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Local Review on a repo with …
        2. …
        3. See …
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Local Review version, VS Code version, and OS.
      placeholder: Local Review 0.0.1 · VS Code 1.90 · macOS 14
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Output from the "Local Review" output channel (enable `localReview.log`). Redact anything sensitive.
      render: shell

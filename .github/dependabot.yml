version: 2
updates:
  # GitHub Actions: keep the pinned commit SHAs (and their version comments) up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ['*']

  # Node dependencies (pnpm). Group routine minor and patch updates; majors get their own PR.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      prefix-development: chore
    groups:
      production-minor-patch:
        dependency-type: production
        update-types: ['minor', 'patch']
      development-minor-patch:
        dependency-type: development
        update-types: ['minor', 'patch']
